version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: whatsapp_saas_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-changeme}
      MONGO_INITDB_DATABASE: whatsapp_saas
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: whatsapp_saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API Server ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp_saas_api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-changeme}@mongodb:27017/whatsapp_saas?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      MESSAGES_PER_MINUTE: ${MESSAGES_PER_MINUTE:-20}
      API_RATE_LIMIT: ${API_RATE_LIMIT:-100}
      GLOBAL_MESSAGE_DELAY: ${GLOBAL_MESSAGE_DELAY:-1000}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      INVOICE_CURRENCY: ${INVOICE_CURRENCY:-USD}
      INVOICE_TAX_RATE: ${INVOICE_TAX_RATE:-0.18}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SESSION_PATH: /app/sessions
      UPLOAD_DIR: /app/uploads
      LOG_DIR: /app/logs
    volumes:
      - sessions_data:/app/sessions
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Message Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp_saas_worker
    restart: unless-stopped
    command: node src/services/worker/MessageWorker.js
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-changeme}@mongodb:27017/whatsapp_saas?authSource=admin
      REDIS_URL: redis://redis:6379
      MESSAGES_PER_MINUTE: ${MESSAGES_PER_MINUTE:-20}
      GLOBAL_MESSAGE_DELAY: ${GLOBAL_MESSAGE_DELAY:-1000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SESSION_PATH: /app/sessions
      LOG_DIR: /app/logs
    volumes:
      - sessions_data:/app/sessions
      - logs_data:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
  sessions_data:
  uploads_data:
  logs_data:
